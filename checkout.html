<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finalizar Compra - Ana Rebeka Artes</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="index.html">
</head>
<body>
  <header>
    <div class="logo">Ana Rebeka Artes</div>
  </header>

  <main class="checkout">
    <h1>Finalizar Compra</h1>
    <p>Escaneie o QR Code abaixo para pagar via Pix:</p>

    <!-- QR Code gerado da sua chave Pix -->
    <img src="img/Cartaz pagamentos via pix simples branco_20260708_112915_0000.png" alt="QR Code Pix" class="qrcode">

    <p>Ou copie e cole a chave Pix:</p>
    <p class="pix-chave">(18)99678-9690</p>

    <h2>📱 Envie o comprovante para nosso WhatsApp:</h2>
    <p><a href="https://wa.me/5518996789690" target="_blank">+55 (18) 99678-9690</a></p>
  </main>

  <script>
function carregarCarrinhoCheckout() {
  const lista = document.getElementById("lista-checkout");
  const totalSpan = document.getElementById("total-checkout");
  const linkWhatsApp = document.getElementById("link-whatsapp");

  lista.innerHTML = "";
  let total = 0;

  const carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  // Montar lista de produtos
  let mensagem = "Olá, segue meu pedido:%0A"; // %0A = quebra de linha

  carrinho.forEach(item => {
    const li = document.createElement("li");
    li.textContent = `${item.produto} - R$${item.preco.toFixed(2)}`;
    lista.appendChild(li);
    total += item.preco;

    mensagem += `- ${item.produto} (R$${item.preco.toFixed(2)})%0A`;
  });

  totalSpan.innerText = total.toFixed(2);
  mensagem += `Total: R$${total.toFixed(2)}%0A`;

  // Codificar mensagem para URL
  const mensagemCodificada = encodeURIComponent(mensagem);

  // Atualizar link do WhatsApp
  linkWhatsApp.href = `https://wa.me/5518996789690?text=${mensagemCodificada}`;
}

// Executa ao carregar a página
carregarCarrinhoCheckout();
</script>


  <footer>
    <p>© 2026 Ana Rebeka Artes - Todos os direitos reservados</p>
  </footer>
</body>
</html>
